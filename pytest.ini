[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
markers =
    mcp_smoke: one smoke test per tool per layer
    mcp_full: full per-tool matrix (happy/guard/edge × layerA/layerB)
    llm: LLM-in-loop tests (qwen via Ollama or Modal)
    mcp: MCP-tool end-to-end test (ported from KaetramGPU)
    game: behavioral game flow test — multi-tool mechanics
    slow: takes >15s; skipped by default in CI
    quest_chain: stage-by-stage quest coverage (deterministic, no LLM)
    reachability: vanilla-player reachability check — minimal seed, proves a discrete quest step is achievable from post-tutorial Mudwich
    integration: full end-to-end Core-5 playthrough with continuity across phases
    skip_tier: upstream-broken quests, regression-only — opt in with -m skip_tier
addopts = --strict-markers -ra -m "not skip_tier"
testpaths = tests
