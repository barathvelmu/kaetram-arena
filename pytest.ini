[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
# Module-scoped test loop is required for live-suite warm-pool reuse: the
# `stdio_client` transport is owned by the event loop that opened it; with
# the default `function` scope, the transport dies when the first test's
# loop tears down and subsequent reseed-reconnect attempts hit
# ClosedResourceError. Module scope keeps one loop alive for all tests in
# a file, matching how reachability/conftest.py's pool drain is scoped.
asyncio_default_test_loop_scope = module
markers =
    mcp_smoke: one smoke test per tool per layer
    mcp_full: full per-tool matrix (happy/guard/edge × layerA/layerB)
    mcp: MCP-tool end-to-end test (ported from KaetramGPU)
    game: behavioral game flow test — multi-tool mechanics
    slow: takes >15s; skipped by default in CI
    reachability: per-step quest reachability check — seeded with the cumulative playthrough state an agent has at that step per game_knowledge.md
addopts = --strict-markers -ra
testpaths = tests
